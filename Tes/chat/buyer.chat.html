<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
</head>
<body>
  <h3>👤 Buyer</h3>
  <div id="log" style="border:1px solid #ccc; height:200px; overflow:auto; padding:10px"></div>
  <input id="msg" placeholder="Ketik pesan..." />
  <input type="file" id="imgFile" accept="image/*" />
  <button onclick="kirim()">Kirim</button>

  <script>
    const socket = io('http://localhost:3000');
    const roomId = '0e5e2390-150a-4c02-9271-3c616c5445b2';
    const senderId = 'user4452';
    const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6InVzZXI0NDUyIiwidXNlcm5hbWUiOiJ1c2VyY2NvdW50MTIzIiwiZW1haWwiOiJ1c2VyMTI0QGdtYWlsLmNvbSIsInJvbGUiOiJ1c2VyIiwiaWF0IjoxNzc5MDMzMjg5LCJleHAiOjE3NzkwMzQxODl9.Lwc0Axz05aCILZDKIszXyd9rjMDLzBkk28iTo0pnL_g'; // ← ganti dengan token login

    socket.on('connect', () => {
      log('✅ Buyer connected: ' + socket.id);
      socket.emit('join_room', roomId);

      log('🖼️ Test image: <img src="https://via.placeholder.com/100" style="max-width:100px">');
    });

    socket.on('new_message', (data) => {
    if (data.imageUrl) {
        log('📨 ' + data.senderId + ': <img src="' + data.imageUrl + '" style="max-width:200px;max-height:200px;display:block">');
    } else {
        log('📨 ' + data.senderId + ': ' + data.message);
    }
});

    socket.on('user_typing', (data) => {
      log('✏️ ' + data.username + ' sedang mengetik...');
    });

    socket.on('error', (data) => {
      log('❌ Error: ' + data.message);
    });

    socket.on('connect_error', (err) => {
      log('❌ Connect error: ' + err.message);
    });

    async function kirim() {
      const msg = document.getElementById('msg').value;
      const file = document.getElementById('imgFile').files[0];

      if (!msg && !file) return;

      // kalau ada file, upload dulu ke Cloudinary via API
      if (file) {
        log('⏳ Mengupload gambar...');
        const formData = new FormData();
        formData.append('image', file);

        const res = await fetch('http://localhost:3000/api/v1/chat/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });

        const data = await res.json();
        if (!res.ok) {
          log('❌ Upload gagal: ' + data.message);
          return;
        }

        socket.emit('send_message', {
          roomId, senderId,
          message: null,
          imageUrl: data.imageUrl
        });
        log('📤 Socket emit send_message dengan imageUrl');
        document.getElementById('imgFile').value = '';
      }

      // kalau ada teks
      if (msg) {
        socket.emit('send_message', {
          roomId, senderId,
          message: msg,
          imageUrl: null
        });
        document.getElementById('msg').value = '';
      }
    }

    function log(msg) {
    const div = document.getElementById('log');
    const p = document.createElement('p');
    p.style.margin = '4px 0';
    p.innerHTML = msg;
    div.appendChild(p);
    div.scrollTop = div.scrollHeight;
}
  </script>
</body>
</html>
